<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CineVault Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="cv-navbar navbar navbar-expand-lg">

    <div class="container-fluid">

        <a class="navbar-brand" href="dashboard.html">

            <i class="fa-solid fa-clapperboard"></i>

            CineVault Admin

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <i class="fa-solid fa-bars"></i>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="dashboard.html">

                        Dashboard

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       href="admin.html">

                        Admin

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="profile.html">

                        Profile

                    </a>

                </li>

                <li class="nav-item">

                    <button
                            id="logoutBtn"
                            class="btn btn-danger ms-lg-3">

                        <i class="fa-solid fa-right-from-bracket"></i>

                        Logout

                    </button>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= PAGE ================= -->

<div class="container py-5">

    <!-- Heading -->

    <div class="d-flex
                justify-content-between
                align-items-center
                flex-wrap
                mb-4">

        <div>

            <h2 class="text-white">

                Movie Management

            </h2>

            <p class="text-secondary">

                Manage all movies in CineVault

            </p>

        </div>

        <a href="movie.html"
           class="btn btn-danger">

            <i class="fa-solid fa-plus"></i>

            Add Movie

        </a>

    </div>

    <!-- Cards -->

    <div class="row g-4 mb-4">

        <div class="col-md-4">

            <div class="admin-card">

                <i class="fa-solid fa-film admin-icon"></i>

                <h5>Total Movies</h5>

                <h2 id="totalMovies">

                    0

                </h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="admin-card">

                <i class="fa-solid fa-star admin-icon"></i>

                <h5>Top Rated</h5>

                <h2 id="topRated">

                    --

                </h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="admin-card">

                <i class="fa-solid fa-language admin-icon"></i>

                <h5>Languages</h5>

                <h2 id="languageCount">

                    0

                </h2>

            </div>

        </div>

    </div>

    <!-- Search -->

    <div class="card bg-dark border-0 shadow-lg mb-4">

        <div class="card-body">

            <div class="row">

                <div class="col-md-6">

                    <input

                            id="searchMovie"

                            type="text"

                            class="form-control"

                            placeholder="Search movie by title...">

                </div>

            </div>

        </div>

    </div>

    <!-- Movie Table -->

    <div class="card bg-dark border-0 shadow-lg">

        <div class="card-body">

            <div class="table-responsive">

                <table
                        class="table table-dark table-hover align-middle">

                    <thead>

                    <tr>

                        <th>#</th>

                        <th>Title</th>

                        <th>Genre</th>

                        <th>Language</th>

                        <th>Year</th>

                        <th>Rating</th>

                        <th width="180">

                            Actions

                        </th>

                    </tr>

                    </thead>

                    <tbody id="movieTableBody">

                    <!-- JS Will Load Movies Here -->

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="js/admin.js"></script>

</body>

</html>
