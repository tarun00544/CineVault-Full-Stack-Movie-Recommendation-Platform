<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add / Edit Movie - CineVault</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="css/admin.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="cv-navbar navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand"
           href="dashboard.html">

            <i class="fa-solid fa-clapperboard"></i>

            CineVault Admin

        </a>

        <div class="ms-auto">

            <a href="admin.html"
               class="btn btn-outline-light">

                <i class="fa-solid fa-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

</nav>

<!-- ================= FORM ================= -->

<div class="container py-5">

    <div class="card bg-dark border-0 shadow-lg">

        <div class="card-body p-4">

            <h2 id="pageTitle"
                class="text-white mb-4">

                Add Movie

            </h2>

            <form id="movieForm">

                <div class="row">

                    <!-- Title -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label text-white">

                            Movie Title

                        </label>

                        <input
                                id="title"
                                class="form-control"
                                required>

                    </div>

                    <!-- Genre -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label text-white">

                            Genre

                        </label>

                        <input
                                id="genre"
                                class="form-control"
                                placeholder="Action, Comedy"
                                required>

                    </div>

                    <!-- Language -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label text-white">

                            Language

                        </label>

                        <input
                                id="language"
                                class="form-control"
                                required>

                    </div>

                    <!-- Release Year -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label text-white">

                            Release Year

                        </label>

                        <input
                                id="releaseYear"
                                type="number"
                                class="form-control"
                                required>

                    </div>

                    <!-- Duration -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label text-white">

                            Duration (Minutes)

                        </label>

                        <input
                                id="duration"
                                type="number"
                                class="form-control"
                                required>

                    </div>

                    <!-- Rating -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label text-white">

                            Rating

                        </label>

                        <input
                                id="rating"
                                type="number"
                                min="0"
                                max="5"
                                step="0.1"
                                class="form-control"
                                required>

                    </div>

                    <!-- Director -->

                    <div class="col-md-8 mb-3">

                        <label class="form-label text-white">

                            Director

                        </label>

                        <input
                                id="director"
                                class="form-control">

                    </div>

                    <!-- Cast -->

                    <div class="col-12 mb-3">

                        <label class="form-label text-white">

                            Cast

                        </label>

                        <input
                                id="cast"
                                class="form-control"
                                placeholder="Actor 1, Actor 2, Actor 3">

                    </div>

                    <!-- Description -->

                    <div class="col-12 mb-3">

                        <label class="form-label text-white">

                            Description

                        </label>

                        <textarea
                                id="description"
                                rows="5"
                                class="form-control"></textarea>

                    </div>
                    
                     <!-- Trailer URL -->

                    <div class="col-12 mb-3">

                        <label class="form-label text-white">

                            Trailer URL

                        </label>

                        <input
                                id="trailerUrl"
                                type="url"
                                class="form-control"
                                placeholder="https://youtube.com/watch?v=xxxx">

                    </div>

                </div>

                              <!-- Movie Poster -->

                 <div class="col-12 mb-3">

        <label class="form-label text-white">
                    Movie Poster
            </label>

                  <input
      
    id="posterUrl"
    type="url"
    class="form-control"
    placeholder="https://image.jpg">

                      </div>

                        <!-- Poster Preview -->

                <div class="col-12 text-center mb-4">

                      <img
        id="posterPreview"
        src="https://placehold.co/250x350?text=Poster"
        class="img-fluid rounded shadow"
        style="max-width:250px;">

                     </div>
                     

                   

                    
                <!-- Buttons -->

                <div class="d-flex justify-content-end gap-3">

                    <a
                            href="admin.html"

                            class="btn btn-secondary">

                        Cancel

                    </a>

                    <button

                            id="saveBtn"

                            type="submit"

                            class="btn btn-danger">

                        <i class="fa-solid fa-floppy-disk me-2"></i>

                        Save Movie

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Movie JS -->

<script type="module" src="js/movie.js"></script>

</body>

</html>
