<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — CineVault</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-form-panel">
      <a href="index.html" class="auth-logo"><i class="fa-solid fa-clapperboard"></i> CineVault</a>
      <h2>Create your account</h2>
      <p class="auth-subtitle">Join CineVault to save movies and get personalized picks.</p>

      <form id="signupForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Jordan Lee" required>
          <div class="invalid-feedback" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          <div class="invalid-feedback" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="password-input-wrap">
            <input type="password" id="password" class="form-control" placeholder="Create a password" required>
            <button type="button" class="toggle-password" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
          </div>
          <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
          <span class="password-strength-label" id="strengthLabel"></span>
          <div class="invalid-feedback" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <div class="password-input-wrap">
            <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter your password" required>
            <button type="button" class="toggle-password" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
          </div>
          <div class="invalid-feedback" id="confirmPasswordError"></div>
        </div>

        <button type="submit" class="btn-cv-primary w-100 mt-2">Create Account</button>
      </form>

      <div class="auth-form-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>

    <div class="auth-visual-panel">
      <div class="auth-visual-quote">
        <p>"A film is never really good unless the camera is an eye in the head of a poet."</p>
        <span>— Orson Welles</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
