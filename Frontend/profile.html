<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — CineVault</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="cv-navbar navbar navbar-expand-lg">
    <div class="container-fluid px-0 d-flex align-items-center w-100">
      <a class="navbar-brand" href="index.html"><i class="fa-solid fa-clapperboard"></i> CineVault</a>
      <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Toggle navigation">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="movies.html">Movies</a></li>
          <li class="nav-item" data-auth-only><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item" data-auth-only><a class="nav-link" href="wishlist.html">Wishlist</a></li>
          <li class="nav-item" data-guest-only><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item ms-lg-2" data-guest-only><a class="nav-link btn-cv-primary px-3 py-2 text-white" href="signup.html">Sign Up</a></li>
          <li class="nav-item dropdown ms-lg-2" data-auth-only>
            <a class="nav-user-pill dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" data-user-pill style="display:none;">
              <div class="avatar-circle" data-avatar>U</div>
              <span data-username>Account</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="dashboard.html"><i class="fa-solid fa-gauge me-2"></i>Dashboard</a></li>
              <li><a class="dropdown-item active" href="profile.html"><i class="fa-solid fa-user me-2"></i>Profile</a></li>
              <li><a class="dropdown-item" href="wishlist.html"><i class="fa-solid fa-heart me-2"></i>Wishlist</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#" data-logout><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="dash-shell" style="padding-left:6%; padding-right:6%; max-width: 920px; margin: 0 auto;">

    <div class="d-flex align-items-center gap-3 mb-4">
      <div class="avatar-circle" id="profileAvatar" style="width:64px; height:64px; font-size:1.4rem;">U</div>
      <div>
        <h2 class="mb-0" id="profileName">User</h2>
        <p class="text-secondary mb-0" id="profileEmail">—</p>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-7">
        <div class="dash-panel">
          <h5 class="dash-panel-title">Update Profile</h5>
          <form id="profileForm">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" id="name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" id="email" class="form-control" required>
            </div>
            <button type="submit" class="btn-cv-primary">Save Changes</button>
          </form>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="dash-panel mb-3">
          <h5 class="dash-panel-title">JWT Token Information</h5>
          <ul class="info-list" id="tokenInfo"></ul>
          <button class="btn-cv-outline w-100 mt-2" id="copyTokenBtn"><i class="fa-solid fa-copy me-2"></i>Copy Token</button>
        </div>

        <div class="dash-panel">
          <h5 class="dash-panel-title">Session</h5>
          <p class="text-secondary small mb-3">Logging out will end your current session on this device.</p>
          <button class="btn-cv-ghost w-100" id="logoutBtn"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/profile.js"></script>
</body>
</html>
